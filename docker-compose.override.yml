services:
  client:
    build:
      dockerfile: DockerfileDev
      target: dev
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
      - client_npm_cache:/root/.npm
    environment:
      BUN_WATCH_USE_POLLING: "true"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    depends_on:
      - server
    restart: unless-stopped
  
  server:
    volumes:
      - ./server:/app
      - api_node_modules:/app/node_modules
    environment:
      BUN_WATCH_USE_POLLING: "true"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    ports:
      - "3001:3001"

  nginx:
    image: nginx:alpine
    container_name: card-game-client-nginx
    depends_on:
      - client
      - server
    volumes:
      - ./client/docker/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  api_node_modules:
  forwards_node_modules:
  client_node_modules:
  client_npm_cache:
