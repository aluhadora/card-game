version: '3.8'

services:
  client:
    build:
      dockerfile: DockerfileDev
      target: dev
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
      - client_npm_cache:/root/.npm
    environment:
      BUN_WATCH_USE_POLLING: "true"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    ports:
      - "3000:5173"
    depends_on:
      - server
    restart: unless-stopped
  
  server:
    volumes:
      - ./server:/app
      - api_node_modules:/app/node_modules
    environment:
      BUN_WATCH_USE_POLLING: "true"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    ports:
      - "3001:3001"

volumes:
  api_node_modules:
  forwards_node_modules:
  client_node_modules:
  client_npm_cache:
