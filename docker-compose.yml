services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: card-game-server
    environment:
      - PORT=3001
      - NODE_ENV=${NODE_ENV:-production}
    expose:
      - "3001"
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: prod
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/test"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    container_name: card-game-client
    expose:
      - "80"
    depends_on:
      - server
    restart: unless-stopped